<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Ebbere Si</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--serif:'Cormorant Garamond',Georgia,serif;--sans:'Outfit',system-ui,sans-serif;--bg:#FAF8F5;--white:#ffffff;--ink:#1A1715;--ink-soft:#5C5651;--ink-muted:#9B938B;--accent:#8B2635;--gold:#C6A96C;--border:rgba(26,23,21,0.08);--radius:12px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}

    /* Auth Gate */
    .auth-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .auth-gate-box{text-align:center;max-width:360px}
    .auth-gate-box h1{font-family:var(--serif);font-size:1.8rem;font-weight:400;margin-bottom:8px}
    .auth-gate-box p{color:var(--ink-muted);font-size:.9rem;margin-bottom:24px}
    .auth-gate-box .btn{display:inline-block;padding:12px 32px;background:var(--accent);color:white;border:none;border-radius:100px;font-family:var(--sans);font-size:.85rem;cursor:pointer;text-decoration:none}

    /* Layout */
    .admin-layout{display:none}
    .admin-header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .admin-logo{font-family:var(--serif);font-size:1.3rem;font-weight:400;color:var(--ink);text-decoration:none}
    .admin-logo span{color:var(--accent)}
    .admin-user{display:flex;align-items:center;gap:12px;font-size:.85rem;color:var(--ink-soft)}
    .admin-logout{background:none;border:1px solid var(--border);padding:6px 16px;border-radius:100px;font-family:var(--sans);font-size:.78rem;cursor:pointer;color:var(--ink-soft)}

    .admin-body{padding:32px;max-width:1200px;margin:0 auto}

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
    .stat-card{background:var(--white);border-radius:var(--radius);padding:20px 24px;border:1px solid var(--border)}
    .stat-card .label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);margin-bottom:8px}
    .stat-card .value{font-family:var(--serif);font-size:2rem;font-weight:500;color:var(--ink)}
    .stat-card .sub{font-size:.78rem;color:var(--ink-muted);margin-top:4px}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
    .tab{padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;font-family:var(--sans);font-size:.85rem;color:var(--ink-muted);cursor:pointer;transition:all .2s}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab:hover{color:var(--ink)}

    /* Table */
    .table-wrap{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto;margin-bottom:24px}
    .table-toolbar{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
    .table-toolbar h3{font-size:.95rem;font-weight:500}
    .table-actions{display:flex;gap:8px}
    .btn-sm{padding:6px 14px;border-radius:8px;font-family:var(--sans);font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--ink-soft);transition:all .2s}
    .btn-sm:hover{background:var(--bg)}
    .btn-sm.primary{background:var(--accent);color:white;border-color:var(--accent)}
    .btn-sm.primary:hover{opacity:.9}

    table{width:100%;border-collapse:collapse;font-size:.85rem}
    thead{background:var(--bg)}
    th{padding:10px 16px;text-align:left;font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);white-space:nowrap}
    td{padding:10px 16px;border-top:1px solid var(--border);color:var(--ink-soft);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    tr:hover td{background:var(--bg)}

    .badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:.72rem;font-weight:500;letter-spacing:.04em}
    .badge-paid{background:rgba(46,125,50,.1);color:#2E7D32}
    .badge-pending{background:rgba(239,108,0,.1);color:#EF6C00}
    .badge-cash{background:rgba(198,169,108,.15);color:#8B7340}
    .badge-active{background:rgba(46,125,50,.1);color:#2E7D32}
    .badge-expired{background:rgba(198,40,40,.1);color:#C62828}
    .badge-available{background:rgba(46,125,50,.1);color:#2E7D32}
    .badge-planning{background:rgba(198,169,108,.15);color:#8B7340}

    .empty-state{padding:48px 24px;text-align:center;color:var(--ink-muted);font-size:.9rem}

    /* Edit modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,23,21,0.5);z-index:100;align-items:center;justify-content:center;padding:24px}
    .modal-overlay.active{display:flex}
    .edit-modal{background:var(--white);border-radius:var(--radius);max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:32px}
    .edit-modal h3{font-family:var(--serif);font-size:1.3rem;margin-bottom:20px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.78rem;font-weight:500;color:var(--ink-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:.88rem;color:var(--ink)}
    .field textarea{resize:vertical;min-height:80px}
    .edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}

    /* Search */
    .search-input{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:.85rem;width:220px}

    /* Responsive */
    @media(max-width:768px){
      .admin-body{padding:16px}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .tabs{overflow-x:auto}
      .search-input{width:100%}
      .table-toolbar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>

  <!-- Auth Gate -->
  <div class="auth-gate" id="authGate">
    <div class="auth-gate-box">
      <h1>Ebbere<span style="color:var(--accent)"> Si</span></h1>
      <p>Pannello di amministrazione</p>
      <a href="/" class="btn" id="loginBtn" onclick="event.preventDefault();redirectToLogin()">Accedi</a>
    </div>
  </div>

  <!-- Admin Layout -->
  <div class="admin-layout" id="adminLayout">
    <header class="admin-header">
      <a href="/admin.html" class="admin-logo">Ebbere<span> Si</span> — Admin</a>
      <div class="admin-user">
        <span id="adminUserEmail"></span>
        <button class="admin-logout" onclick="handleAdminLogout()">Esci</button>
        <a href="/" class="btn-sm" style="text-decoration:none">← Sito</a>
      </div>
    </header>

    <div class="admin-body">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- Tabs -->
      <div class="tabs" id="tabsBar">
        <button class="tab active" onclick="switchTab('bookings')">Prenotazioni</button>
        <button class="tab" onclick="switchTab('events')">Eventi</button>
        <button class="tab" onclick="switchTab('members')">Soci</button>
        <button class="tab" onclick="switchTab('users')">Utenti</button>
        <button class="tab" onclick="switchTab('newsletter')">Newsletter</button>
      </div>

      <!-- Tab Content -->
      <div id="tabContent"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="edit-modal">
      <h3 id="editModalTitle">Modifica</h3>
      <div id="editModalBody"></div>
      <div class="edit-actions">
        <button class="btn-sm" onclick="closeEditModal()">Annulla</button>
        <button class="btn-sm primary" id="editSaveBtn" onclick="saveEdit()">Salva</button>
      </div>
    </div>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
